<script type="text/javascript">
    RED.nodes.registerType('trigger-atleast-every-x',{
        category: 'function',
        color: '#a6bfcf',
        defaults: {
            name: {value: ""},
            on_payload: {value: "ON"},
            off_payload: {value: "OFF"},
            on_time: {value: 691200, validate:RED.validators.number()},
            on_duration: {value: 300, validate:RED.validators.number()}
        },
        inputs: 1,
        outputs: 1,
        align: "right",
        icon: "function.png",
        label: function() {
            return this.name || "trigger every";
        }
    });
</script>

<script type="text/x-red" data-template-name="trigger-atleast-every-x">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>

    <div class="form-row">
        <label for="node-input-on_payload""><i class="icon-tag"></i> On Payload</label>
        <input type="text" id="node-input-on_payload" placeholder="ON">
    </div>

    <div class="form-row">
        <label for="node-input-off_payload"><i class="icon-tag"></i> Off Payload</label>
        <input type="text" id="node-input-off_payload" placeholder="OFF">
    </div>

     <div class="form-row">
        <label for="node-input-on_time"><i class="icon-tag"></i> Time to wait to send ON</label>
        <input type="text" id="node-input-on_time" placeholder="691200">
    </div>

    <div class="form-row">
        <label for="node-input-on_duration"><i class="icon-tag"></i> Time to wait to send OFF (after ON)</label>
        <input type="text" id="node-input-on_duration" placeholder="300">
    </div>
</script>

<script type="text/x-red" data-help-name="trigger-atleast-every-x">
    <p>This node is used to watch the payload coming in. Usually used with an ON or OFF payloads. 
When ON is received, the unit resets and sends an ON.
If it's reset and OFF is received, an OFF is send and then the unit makes sure that after <i>on_time</i> seconds an ON is send, unless reset. Incoming OFF payloads are ignored in the mean time.
If the unit has send an ON because of the timer, after <i>on_duration</i> seconds, an OFF is send and the unit is reset./p>
</script>
